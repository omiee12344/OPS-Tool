<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBL Processor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 900px;
        }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <div class="panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>RBL - Upload Files</h2>
            <a class="btn btn-secondary" href="{{ url_for('index') }}">Back</a>
        </div>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="alert alert-success">{{ success }}</div>
        {% endif %}
        <form action="{{ url_for('process_rbl') }}" method="post" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
                <label class="form-label">Select file(s) (XLSX, XLS)</label>
                <input class="form-control" type="file" name="files" multiple accept=".xlsx,.xls">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">End Customer Name</label>
                    <input class="form-control" type="text" name="end_customer_name" placeholder="e.g., RB">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Priority</label>
                    <input class="form-control" type="text" name="priority" placeholder="e.g., REG, URGENT">
                </div>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" value="true" id="separate" name="separate">
                <label class="form-check-label" for="separate">Process files separately</label>
            </div>
            <button class="btn btn-primary" type="submit">Process</button>
        </form>

        {% if download_url %}
            <a class="btn btn-success" href="{{ download_url }}">Download Output</a>
        {% endif %}
        {% if download_urls %}
            <ul class="list-group">
                {% for f in download_urls %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>{{ f.filename }}</span>
                        <a class="btn btn-sm btn-success" href="{{ f.url }}">Download</a>
                    </li>
                {% endfor %}
            </ul>
        {% endif %}
        </div>
    </div>
</body>
</html>
